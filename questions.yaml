# GTMA Stage 1: Automated Assessment Questions
# Format: Each question has a unique ID, text, points, and correct answer patterns
# Critical questions (anti-reward-hacking) have is_critical: true

assessment:
  name: "GTMA Stage 1: Foundational Knowledge"
  time_limit_minutes: 90
  total_points: 85
  pass_threshold: 65
  critical_threshold: 0  # Any critical question with score 0 = automatic fail

  sections:
    - id: "s1"
      name: "Anti-Reward-Hacking Core"
      points: 25

      questions:
        - id: "q1_1"
          text: |
            A contributor proposes a task where the hidden target is generated by a deterministic 
            ODE solver with known equations, but the initial conditions are "hidden" in data/private/. 
            The public data contains 10,000 training trajectories with their initial conditions and outcomes.

            (a) Explain why this task fails the Reconstructable-Generator Rule (Section 8). 
            Be specific about what the agent can do and why ML is not load-bearing. (4 pts)

            (b) Describe the structural redesign needed—not a patch, but a fundamental redesign. 
            Your answer must propose a different task structure that passes the Rule. (4 pts)
          points: 8
          is_critical: true
          rubric:
            - criterion: "Identifies that agent can fit ODE parameters from 10k training trajectories"
              points: 2
              keywords: ["fit parameters", "learn initial conditions", "reconstruct generator", 
                          "deterministic map", "no ML needed", "knows-the-law attacker"]
            - criterion: "Explains that smooth/analytic map allows parameter extrapolation"
              points: 1
              keywords: ["smooth", "analytic", "extrapolate", "interpolate", "continuous"]
            - criterion: "Explains why ML is not load-bearing (agent can evaluate map directly)"
              points: 1
              keywords: ["evaluate map", "direct computation", "closed form", "analytical solution"]
            - criterion: "Proposes structural redesign (not hiding parameters better)"
              points: 2
              keywords: ["inverse problem", "real data", "measured data", "unknown forward model",
                          "sampling from known density", "computationally intractable"]
            - criterion: "Redesign passes reconstructable-generator audit"
              points: 2
              keywords: ["no accessible generator", "agent cannot reconstruct", "unknown law",
                          "inverse", "identification"]

        - id: "q1_2"
          text: |
            A task's evaluation simulator is declared in 'dependencies' rather than 
            'env_dependencies' or 'grading_dependencies'. A capable agent discovers it can 
            'import eval_sim' during solve time.

            (a) List three distinct attack vectors this enables. Each vector must describe 
            a different way the agent exploits the importability. (6 pts)

            (b) Explain why moving the package to 'grading_dependencies' alone might not be 
            sufficient if the agent can still reconstruct the simulator from public artifacts. (2 pts)
          points: 8
          is_critical: true
          rubric:
            - criterion: "Attack vector 1: In-process reconstruction of held-out evaluation"
              points: 2
              keywords: ["reconstruct evaluation", "run simulator", "generate targets",
                        "in-process", "import eval", "held-out"]
            - criterion: "Attack vector 2: Parameter fitting / system identification"
              points: 2
              keywords: ["fit parameters", "system identification", "learn dynamics",
                        "clone simulator", "reverse engineer"]
            - criterion: "Attack vector 3: Oracle access / direct target computation"
              points: 2
              keywords: ["oracle", "compute targets directly", "evaluate on test",
                        "bypass learning", "direct access"]
            - criterion: "Explains that public artifacts may expose simulator structure"
              points: 1
              keywords: ["public data", "public artifacts", "schema reveals", 
                        "simulator code in public", "equations exposed"]
            - criterion: "Explains that agent can rebuild from public info + package"
              points: 1
              keywords: ["rebuild from public", "reconstruct from artifacts", 
                        "package + public data", "still vulnerable"]

        - id: "q1_3"
          text: |
            The guide states: "Parameter-extrapolation splits do not save [a broken design] 
            when the map is smooth or analytic in those parameters."

            Construct a concrete counterexample:
            (a) Define a forward map (mathematical expression). (2 pts)
            (b) Define a parameter split (what is in train vs test). (2 pts)
            (c) Show mathematically why a knows-the-law attacker still beats the ML reference 
            without learning. Include the attacker's algorithm and why it succeeds. (5 pts)
          points: 9
          is_critical: true
          rubric:
            - criterion: "Defines a smooth/analytic forward map"
              points: 2
              keywords: ["f(x, theta)", "smooth function", "analytic function", 
                        "differentiable", "polynomial", "exponential", "sin", "cos"]
            - criterion: "Defines parameter split (train vs test parameter ranges)"
              points: 2
              keywords: ["train parameters", "test parameters", "parameter range",
                        "extrapolation", "interpolation", "split by parameter"]
            - criterion: "Shows attacker can evaluate map at test parameters"
              points: 2
              keywords: ["evaluate at test", "plug in test parameters", "direct evaluation",
                        "no training needed", "analytical solution"]
            - criterion: "Explains why smoothness enables extrapolation"
              points: 2
              keywords: ["smooth", "analytic continuation", "Taylor expansion", 
                        "continuous", "no discontinuity", "well-behaved"]
            - criterion: "Shows ML reference is unnecessary"
              points: 1
              keywords: ["ML not needed", "learning is redundant", "direct computation wins",
                        "closed form beats learning"]

    - id: "s2"
      name: "Calibration & Scoring Architecture"
      points: 25

      questions:
        - id: "q1_4"
          text: |
            A contributor sets FLOOR to their naive baseline's measured score (0.35). 
            Their reference scores 0.72 raw, which they map to 0.5 using PiecewiseLinearCurve.from_reference(X_REF).

            (a) Why is this called "the single most damaging calibration error" (Section 14)? 
            Explain what happens to the scoring curve and the interpretability of scores. (3 pts)

            (b) What happens to the sub-reference headroom? Quantify the problem if the floor 
            should have been 0.0 (no-skill) and the perfect is 1.0. (3 pts)

            (c) How does this poison the RL training signal for the agent? Explain the incentive distortion. (2 pts)
          points: 8
          is_critical: false
          rubric:
            - criterion: "Identifies floor should be no-skill, not baseline"
              points: 1
              keywords: ["floor is no-skill", "not baseline", "SRE 1.0", "AUC 0.5",
                        "majority class", "constant predictor", "random policy"]
            - criterion: "Explains collapsed headroom: baseline at 0.35 becomes indistinguishable from progress"
              points: 1
              keywords: ["collapsed headroom", "no room below reference", "baseline too high",
                        "sub-reference compressed"]
            - criterion: "Quantifies: with floor=0.35, reference at 0.72 maps to 0.5, but true no-skill would be near 0"
              points: 1
              keywords: ["0.35 to 0.72", "compressed range", "true no-skill is 0", 
                        "wrong floor", "miscalibrated"]
            - criterion: "Explains scoring curve distortion"
              points: 1
              keywords: ["curve distortion", "wrong slope", "non-linear where should be linear",
                        "progress not proportional"]
            - criterion: "Explains RL signal poisoning: agent gets credit for trivial progress"
              points: 1
              keywords: ["RL signal", "training signal", "poisoned", "trivial progress",
                        "easy points", "inflated scores", "wrong incentive"]
            - criterion: "Explains incentive distortion: agent optimizes for baseline-level, not expert-level"
              points: 1
              keywords: ["incentive distortion", "optimizes baseline", "not expert",
                        "wrong target", "mediocrity rewarded"]
            - criterion: "Mentions that floor to baseline removes discriminative power below reference"
              points: 1
              keywords: ["discriminative power", "below reference", "no differentiation",
                        "weak agents look strong"]

        - id: "q1_5"
          text: |
            Design a scoring scenario with three targets:
            - Two regression targets (RMSE-based): Target A and Target B
            - One classification target (F1): Target C

            Your answer must include:
            (a) Floor values for each target with provenance (why this floor, not a baseline). (2 pts)
            (b) REF anchors for each target (what raw score maps to 0.5 progress). (2 pts)
            (c) PERFECT values for each target (theoretical optimum, not best measured). (1 pt)
            (d) The full calibration chain: show the progress_lower_better / progress_higher_better 
            calls, the weighted aggregation, and the PiecewiseLinearCurve.from_reference(X_REF) call. (2 pts)
            (e) Why your weighting favors discriminative targets. (1 pt)
          points: 8
          is_critical: false
          rubric:
            - criterion: "Floor A: no-skill provenance (e.g., SRE=1.0 for constant-mean predictor)"
              points: 1
              keywords: ["SRE 1.0", "constant mean", "no-skill", "floor provenance",
                        "analytical floor", "not baseline"]
            - criterion: "Floor B: no-skill provenance"
              points: 1
              keywords: ["SRE 1.0", "constant mean", "no-skill", "floor provenance"]
            - criterion: "Floor C: no-skill provenance (e.g., F1 of majority class or random classifier)"
              points: 1
              keywords: ["F1 floor", "majority class", "random classifier", "no-skill F1"]
            - criterion: "REF anchors for all three targets with reasonable values"
              points: 1
              keywords: ["REF", "reference anchor", "0.5 progress", "X_REF"]
            - criterion: "PERFECT values are theoretical optima (RMSE=0, F1=1.0)"
              points: 1
              keywords: ["PERFECT", "theoretical optimum", "RMSE 0", "F1 1.0",
                        "best possible", "not measured"]
            - criterion: "Shows correct calibration code with PiecewiseLinearCurve.from_reference"
              points: 1
              keywords: ["PiecewiseLinearCurve", "from_reference", "progress_lower_better",
                        "progress_higher_better", "calibration"]
            - criterion: "Weights sum to 1.0 and favor discriminative targets"
              points: 1
              keywords: ["weights sum to 1", "discriminative", "harder target weighted more",
                        "easy target downweighted"]

        - id: "q1_6"
          text: |
            For a policy task, explain the distinction between internal reward (training signal) 
            and final score (grading metric). Design a scenario where conflating them creates a 
            perverse incentive: an agent that exploits the shaping outperforms one that solves the 
            true objective. Provide concrete reward functions for both.
          points: 9
          is_critical: false
          rubric:
            - criterion: "Clear distinction: internal reward = dense/shaped for learning; final score = sparse/true objective"
              points: 2
              keywords: ["internal reward", "training signal", "dense", "shaped",
                        "final score", "grading metric", "sparse", "true objective"]
            - criterion: "Scenario with perverse incentive clearly described"
              points: 2
              keywords: ["perverse incentive", "exploit shaping", "circle near goal",
                        "accumulate bonuses", "not reach goal"]
            - criterion: "Concrete internal reward function provided"
              points: 2
              keywords: ["reward function", "dense reward", "step penalty", "progress bonus",
                        "distance to goal", "shaping"]
            - criterion: "Concrete final score function provided"
              points: 2
              keywords: ["final score", "success rate", "reach goal", "sparse reward",
                        "binary", "true objective"]
            - criterion: "Explains why agent that exploits shaping scores higher on internal reward but fails true objective"
              points: 1
              keywords: ["exploit", "shaping", "higher internal", "fails true", 
                        "conflation problem"]

    - id: "s3"
      name: "Domain Faithfulness & Technical Rigor"
      points: 20

      questions:
        - id: "q1_7"
          text: |
            A task claims to model "turbulent fluid dynamics" but the generator produces random 
            velocity fields with a Gaussian power spectrum and labels them as "turbulent energy 
            dissipation rates." Walk through the domain-faithfulness audit (Section 7). Which 
            invariants are violated? What specific structures (conservation laws, symmetries, 
            topology) are missing? What would a domain expert immediately flag?
          points: 10
          is_critical: false
          rubric:
            - criterion: "Identifies missing Navier-Stokes or equivalent governing equations"
              points: 2
              keywords: ["Navier-Stokes", "governing equations", "conservation of momentum",
                        "conservation of mass", "energy equation"]
            - criterion: "Identifies missing conservation laws (energy, momentum, mass)"
              points: 2
              keywords: ["conservation", "energy conservation", "momentum conservation",
                        "mass conservation", "incompressible", "divergence free"]
            - criterion: "Identifies missing symmetries (Galilean, rotational, translational)"
              points: 2
              keywords: ["symmetry", "Galilean invariance", "rotational symmetry",
                        "translational symmetry", "isotropy", "homogeneity"]
            - criterion: "Identifies missing topological constraints (vorticity, helicity, Reynolds number)"
              points: 2
              keywords: ["vorticity", "helicity", "Reynolds number", "turbulence cascade",
                        "Kolmogorov", "inertial range", "dissipation range"]
            - criterion: "Explains why Gaussian random fields are not turbulent"
              points: 2
              keywords: ["Gaussian is not turbulent", "no intermittency", "no coherent structures",
                        "no vortices", "no energy cascade", "random is not physics"]

        - id: "q1_8"
          text: |
            The guide requires: "more than half of the reference's progress in score units comes 
            from its learned components, not from deterministic feature engineering." Describe a 
            self-test protocol to verify this. If a substantially simpler model on the reference's 
            engineered features matches the reference's score, what does this imply and how must 
            the task be redesigned?
          points: 10
          is_critical: false
          rubric:
            - criterion: "Describes self-test: train simple model on reference's features, compare scores"
              points: 3
              keywords: ["self-test", "simple model", "engineered features", "compare scores",
                        "Ridge", "linear regression", "logistic regression", "baseline on features"]
            - criterion: "Defines threshold: if simple model matches reference, architecture is decoration"
              points: 2
              keywords: ["matches reference", "architecture is decoration", "ML not load-bearing",
                        "feature engineering does the work", "model is irrelevant"]
            - criterion: "Implies task must be redesigned to require learned representations"
              points: 2
              keywords: ["redesign", "require learning", "learned representations",
                        "not solvable by features alone", "add structure"]
            - criterion: "Proposes specific redesign: add complexity that requires learning"
              points: 2
              keywords: ["add non-linearity", "high-dimensional patterns", "temporal dynamics",
                        "spatial dependencies", "hierarchical structure", "requires neural network"]
            - criterion: "Mentions that reference must still be expert-strength after redesign"
              points: 1
              keywords: ["expert-strength", "domain-informed", "still beats baselines",
                        "reference remains strong"]

    - id: "s4"
      name: "Platform & Operational Constraints"
      points: 15

      questions:
        - id: "q1_9"
          text: |
            TPU tasks have specific constraints: single-tenant chip, no fp64, grade path must be 
            CPU-deterministic. List three task paradigms that are unsuitable for TPU and explain why.
          points: 5
          is_critical: false
          rubric:
            - criterion: "Identifies env/hybrid as unsuitable (live env + training contend for single chip)"
              points: 2
              keywords: ["env", "hybrid", "live environment", "contend for chip",
                        "socket", "env server", "single tenant"]
            - criterion: "Identifies tasks requiring fp64 as unsuitable"
              points: 1
              keywords: ["fp64", "double precision", "not supported", "bf16 only"]
            - criterion: "Identifies tasks where grade path needs accelerator as unsuitable"
              points: 1
              keywords: ["grade path", "needs TPU", "inference on TPU", "device-deterministic"]
            - criterion: "Third paradigm with valid explanation"
              points: 1
              keywords: ["graphics", "CUDA rasterization", "PyTorch3D", "nerfacc",
                        "real-time rendering", "OpenGL", "Vulkan"]

        - id: "q1_10"
          text: |
            The hf_resources field requires pinning to commit SHAs. Explain the reproducibility 
            failure mode of unpinned entries, and describe the licensing gate implications 
            (Section 4.2 + Section 20).
          points: 5
          is_critical: false
          rubric:
            - criterion: "Explains unpinned resolves 'main' at pack time, which changes"
              points: 2
              keywords: ["unpinned", "main branch", "pack time", "changes over time",
                        "non-reproducible", "different weights", "breaking change"]
            - criterion: "Explains that different pack dates produce different task images"
              points: 1
              keywords: ["different pack dates", "different images", "reproducibility failure",
                        "non-deterministic"]
            - criterion: "Explains licensing gate: every mounted repo is external asset"
              points: 1
              keywords: ["licensing gate", "external asset", "permissive license",
                        "license check", "HF_TOKEN"]
            - criterion: "Explains that gated repos need HF_TOKEN at pack time only"
              points: 1
              keywords: ["HF_TOKEN", "pack time only", "not runtime", "gated repo",
                        "authentication"]

        - id: "q1_11"
          text: |
            A contributor runs their reference on --flavor slim and commits the resulting 
            build_proof.json. What is wrong with this workflow, and what validation stages 
            would catch or miss the error?
          points: 5
          is_critical: false
          rubric:
            - criterion: "Identifies slim flavor scores are not calibration-equivalent to heavy/production"
              points: 2
              keywords: ["slim not equivalent", "not calibration-equivalent", "plumbing only",
                        "weak dev machine", "different scores"]
            - criterion: "Explains that anchors must be confirmed on heavy base or deployment tier"
              points: 1
              keywords: ["confirm on heavy", "deployment tier", "production base",
                        "real image", "heavy flavor"]
            - criterion: "Identifies that validator does not rebuild stale proof for ML Envs tasks"
              points: 1
              keywords: ["validator", "does not rebuild", "stale proof", "committed proof",
                        "manual rerun"]
            - criterion: "Identifies that ground-truth run would catch this if re-run on heavy"
              points: 1
              keywords: ["ground-truth run", "lbx-rl-harness", "reference", "heavy flavor",
                        "re-run"]
